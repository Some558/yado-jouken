name: Weekly squeeze + facilities refresh

# JST 日曜 04:17 = UTC 土曜 19:17 (日本はDSTなし)
on:
  schedule:
    - cron: "17 19 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yadoshibori-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: "Daily + weekly fetch -> transform -> validate -> promote"
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          PYTHONPATH: pipeline
        run: |
          set -euo pipefail
          AS_OF=$(TZ=Asia/Tokyo date +%F)
          python3 pipeline/fetch.py --mode daily --as-of "$AS_OF"
          python3 pipeline/fetch.py --mode weekly --as-of "$AS_OF"
          python3 pipeline/transform.py --as-of "$AS_OF"
          python3 pipeline/validate.py
          rm -rf data/latest
          cp -R data/staged data/latest

      - name: Commit latest + squeeze cache + facilities
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest/ data/cache/squeeze.json data/facilities/
          if git diff --staged --quiet; then
            echo "no data changes"
          else
            AS_OF=$(TZ=Asia/Tokyo date +%F)
            git commit -m "data: weekly refresh ${AS_OF}"
            git push
          fi

      - name: Slack success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          AS_OF=$(TZ=Asia/Tokyo date +%F)
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then echo "SLACK_WEBHOOK_URL未設定"; exit 1; fi
          python3 - <<'PY'
          import os
          from urllib.parse import urlparse
          u = urlparse(os.environ["SLACK_WEBHOOK_URL"])
          print(f"slack_host={u.hostname!r} scheme={u.scheme!r} path_ok={bool(u.path and len(u.path)>10)}")
          PY
          curl -sfS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ ヤドシボリ週次更新: ${AS_OF} 完了 (squeeze+facilities)\"}"
          echo "slack_ok"

      - name: Slack failure
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          AS_OF=$(TZ=Asia/Tokyo date +%F)
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then echo "SLACK_WEBHOOK_URL未設定"; exit 0; fi
          curl -sfS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"🔴 ヤドシボリ週次更新: ${AS_OF} エラー (前日データ維持)\"}"
          echo "slack_ok"